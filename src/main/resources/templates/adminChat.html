<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Support Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #0f172a;
            color: white;
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 300px;
            background: #1e293b;
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 20px;
            background: #2563eb;
            font-weight: bold;
            font-size: 18px;
        }

        .user-list {
            flex: 1;
            overflow-y: auto;
        }

        .user-item {
            padding: 15px 20px;
            border-bottom: 1px solid #334155;
            cursor: pointer;
            transition: 0.2s;
        }

        .user-item:hover, .user-item.active {
            background: #334155;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0f172a;
        }

        .chat-header {
            padding: 20px;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            font-weight: bold;
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-area button:hover {
            background: #1d4ed8;
        }

        /* Scrollbar styles */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e293b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #475569; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b; 
        }

        /* Animations */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .msg {
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 75%;
            word-wrap: break-word;
            animation: fadeSlideUp 0.3s ease-out forwards;
            line-height: 1.5;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .msg.user {
            background: #334155;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .msg.admin {
            background: #2563eb;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .user-item {
            padding: 15px 20px;
            border-bottom: 1px solid #334155;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.4s ease-out;
        }

        .user-item:hover {
            background: #334155;
            padding-left: 25px;
        }

        .user-item.active {
            background: #334155;
            border-left: 4px solid #3b82f6;
        }
        
        .badge {
            background: #ef4444; 
            color: white; 
            border-radius: 9999px; 
            padding: 2px 8px; 
            font-size: 11px; 
            font-weight: bold;
            box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
            animation: fadeIn 0.3s ease-out;
        }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="header" style="display: flex; flex-direction: column; gap: 15px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span><i class="fas fa-headset"></i> Support Queue</span>
            <a href="/admin/dashboard" style="color: #60a5fa; text-decoration: none; font-size: 14px; font-weight: normal; transition: 0.3s;"><i class="fas fa-arrow-left"></i> Home</a>
        </div>
        <div style="position: relative;">
            <input type="text" id="searchInput" placeholder="Tìm kiếm người dùng..." 
                   style="width: 100%; padding: 10px 10px 10px 35px; border-radius: 8px; border: none; background: #334155; color: white; outline: none;"
                   onkeyup="filterUsers()">
            <i class="fas fa-search" style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: #94a3b8;"></i>
        </div>
    </div>
    <div class="user-list" id="userList">
        <div class="user-item" id="user-BROADCAST" onclick="selectUser('BROADCAST')">
            <span><i class="fas fa-bullhorn" style="margin-right: 8px; color: #fbbf24;"></i> Phát sóng (Tất cả)</span>
        </div>
        <!-- Active chats will appear here -->
    </div>
</div>

<div class="chat-area">
    <div class="chat-header" id="chatHeader">
        <div style="display: flex; align-items: center; gap: 10px; color: #94a3b8;">
            <i class="fas fa-comments" style="font-size: 1.5rem;"></i>
            <span>Vui lòng chọn người dùng để chat</span>
        </div>
    </div>
    <div class="messages" id="messagesArea" style="justify-content: center; align-items: center; color: #64748b; font-size: 1.2rem;">
        <div style="text-align: center; display: flex; flex-direction: column; align-items: center; gap: 15px; opacity: 0.5;">
            <i class="fas fa-inbox" style="font-size: 4rem;"></i>
            <p>Hộp thư hỗ trợ trực tuyến</p>
        </div>
    </div>
        <!-- Messages -->
    </div>
    <div class="input-area">
        <input type="text" id="adminInput" placeholder="Nhập tin nhắn..." disabled
               onkeypress="if(event.key === 'Enter') sendAdminMessage()">
        <button id="sendBtn" disabled onclick="sendAdminMessage()">Gửi</button>
    </div>
</div>

<script>
    let stompClient = null;
    const users = {}; // username -> array of messages
    const unreadCounts = {}; // username -> count of unread messages
    let activeUser = null;

    function connect() {
        const socket = new SockJS('/ws-chat');
        stompClient = Stomp.over(socket);
        stompClient.debug = null;
        stompClient.connect({}, function (frame) {
            stompClient.subscribe('/topic/admin', function (message) {
                const msg = JSON.parse(message.body);
                handleIncomingMessage(msg);
            });
        }, function(error) {
            console.error("Lỗi mất kết nối WebSocket, đang thử lại...", error);
            setTimeout(connect, 5000); // Tự động reconnect sau 5s
        });
    }

    function filterUsers() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const items = document.querySelectorAll('.user-item');
        items.forEach(item => {
            if (item.id === 'user-BROADCAST') return; // Always show broadcast
            const text = item.innerText.toLowerCase();
            if (text.includes(query)) {
                item.style.display = 'flex';
            } else {
                item.style.display = 'none';
            }
        });
    }

    function handleIncomingMessage(msg) {
        const sender = msg.sender;
        if (!users[sender]) {
            users[sender] = [];
            renderUserList();
        }
        users[sender].push(msg);

        if (activeUser === sender) {
            appendMessage(msg);
        } else {
            // Increment unread and update UI
            unreadCounts[sender] = (unreadCounts[sender] || 0) + 1;
            renderUserList();
        }
    }

    function renderUserList() {
        const list = document.getElementById('userList');

        // Manage Broadcast button dynamically
        let broadcastDiv = document.getElementById('user-BROADCAST');
        if (!broadcastDiv) {
            broadcastDiv = document.createElement('div');
            broadcastDiv.id = 'user-BROADCAST';
            broadcastDiv.onclick = () => selectUser('BROADCAST');
            list.appendChild(broadcastDiv);
        }
        broadcastDiv.className = 'user-item' + (activeUser === 'BROADCAST' ? ' active' : '');
        broadcastDiv.innerHTML = `<span>📢 Phát sóng (Tất cả)</span>`;

        for (const username in users) {
            if (username === 'BROADCAST') continue;
            
            let div = document.getElementById('user-' + username);
            if (!div) {
                div = document.createElement('div');
                div.id = 'user-' + username;
                div.onclick = () => selectUser(username);
                // Insert after broadcast but top of the list if new
                if (list.children.length > 1) {
                    list.insertBefore(div, list.children[1]);
                } else {
                    list.appendChild(div);
                }
            }
            
            div.className = 'user-item' + (activeUser === username ? ' active' : '');
            
            const count = unreadCounts[username] || 0;
            if (count > 0) {
                div.innerHTML = `<span><i class="fas fa-user-circle" style="margin-right: 8px; color: #94a3b8;"></i> ${username}</span> <span class="badge">${count}</span>`;
                div.style.fontWeight = 'bold';
            } else {
                div.innerHTML = `<span><i class="fas fa-user-circle" style="margin-right: 8px; color: #94a3b8;"></i> ${username}</span>`;
                div.style.fontWeight = 'normal';
            }
        }
    }

    function selectUser(username) {
        activeUser = username;
        document.getElementById('chatHeader').innerHTML = `
            <div style="display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-user-circle" style="font-size: 1.5rem; color: #60a5fa;"></i>
                <span style="font-weight: bold; font-size: 1.1rem;">${username === 'BROADCAST' ? 'Kênh Phát Sóng (Tất cả Users)' : username}</span>
            </div>
        `;
        document.getElementById('adminInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('adminInput').focus();

        if (username !== 'BROADCAST') unreadCounts[username] = 0;
        renderUserList();
        renderMessages();
    }

    function renderMessages() {
        const area = document.getElementById('messagesArea');
        area.style.justifyContent = 'flex-start';
        area.style.alignItems = 'stretch';
        area.innerHTML = '';
        if (!activeUser || !users[activeUser]) {
            if (activeUser && (!users[activeUser] || users[activeUser].length === 0)) {
                area.style.justifyContent = 'center';
                area.style.alignItems = 'center';
                area.innerHTML = `<div style="opacity: 0.5; color: #94a3b8;"><i class="fas fa-comment-dots" style="font-size: 2rem; display: block; text-align: center; margin-bottom: 10px;"></i> Chưa có tin nhắn nào</div>`;
            }
            return;
        }

        users[activeUser].forEach(msg => {
            const div = document.createElement('div');
            div.className = 'msg ' + (msg.type === 'USER' ? 'user' : 'admin');
            div.innerText = msg.content;
            area.appendChild(div);
        });
        area.scrollTop = area.scrollHeight;
    }

    function appendMessage(msg) {
        const area = document.getElementById('messagesArea');
        const div = document.createElement('div');
        div.className = 'msg ' + (msg.type === 'USER' ? 'user' : 'admin');
        div.innerText = msg.content;
        area.appendChild(div);
        
        area.scrollTo({
            top: area.scrollHeight,
            behavior: 'smooth'
        });
    }

    function sendAdminMessage() {
        if (!activeUser || !stompClient) return;
        const input = document.getElementById('adminInput');
        const content = input.value.trim();
        if (content) {
            const chatMessage = {
                sender: 'Admin',
                content: content,
                type: 'ADMIN',
                targetUser: activeUser === 'BROADCAST' ? null : activeUser
            };

            if (activeUser === 'BROADCAST') {
                // Send broadcast
                stompClient.send("/app/chat.adminBroadcast", {}, JSON.stringify(chatMessage));
            } else {
                // Send to specific user
                stompClient.send("/app/chat.adminReply", {}, JSON.stringify(chatMessage));
            }

            // Save locally to display
            if (!users[activeUser]) users[activeUser] = [];
            users[activeUser].push(chatMessage);
            
            // Re-render empty state to normal if it's the first message
            if (users[activeUser].length === 1) renderMessages();
            else appendMessage(chatMessage);

            input.value = '';
        }
    }

    async function loadHistory() {
        try {
            const res = await fetch('/admin/chat/history');
            if (res.ok) {
                const history = await res.json();
                for (const targetUser in history) {
                    if (!users[targetUser]) users[targetUser] = [];
                    history[targetUser].forEach(msg => {
                        users[targetUser].push(msg);
                    });
                }
                renderUserList();
            }
        } catch (e) {
            console.error("Lỗi tải lịch sử chat", e);
        }
    }

    window.onload = function() {
        connect();
        loadHistory();
    };
</script>
</body>
</html>
