<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* background blur circles */
        .bg-circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
        }

        .c1 {
            width: 300px;
            height: 300px;
            background: #00f2fe;
            top: 10%;
            left: 10%;
        }

        .c2 {
            width: 400px;
            height: 400px;
            background: #4facfe;
            bottom: 10%;
            right: 10%;
        }

        .card {
            position: relative;
            width: 380px;
            padding: 40px;
            border-radius: 16px;
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            color: white;
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2 {
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px 40px 12px 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        .input-group span {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.6;
        }

        input:focus {
            box-shadow: 0 0 0 2px #00f2fe;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error {
            margin-top: 15px;
            color: #ffb3b3;
            font-size: 13px;
        }

        .success {
            margin-top: 15px;
            color: #b6ffb3;
            font-size: 13px;
        }

        .footer {
            margin-top: 20px;
            font-size: 13px;
        }

        .footer a {
            color: #00f2fe;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="bg-circle c1"></div>
<div class="bg-circle c2"></div>

<div class="card">
    <h2>Quên mật khẩu</h2>
    <p class="subtitle">Nhập email để nhận mã OTP</p>
    <form method="post" action="/forgot"
          onsubmit="handleSubmit(this)">

        <div class="input-group">
            <input type="email" name="email" placeholder="Nhập email của bạn" required>
            <span>📧</span>
        </div>
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">

        <button id="submitBtn" type="submit">Gửi OTP</button>
    </form>

    <p class="error" th:text="${error}"></p>
    <p class="success" th:text="${message}"></p>

    <div class="footer">
        <a href="/login">← Quay lại đăng nhập</a>
    </div>
</div>

<script>
    function handleSubmit(form) {
        const btn = document.getElementById("submitBtn");
        btn.innerText = "Đang gửi...";
        btn.disabled = true;
    }
</script>

</body>
</html>
