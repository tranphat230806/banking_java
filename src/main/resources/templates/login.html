<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 25px;
            color: #333;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .footer {
            margin-top: 15px;
            font-size: 13px;
            color: #777;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

<div class="login-container">
    <h2>Login Bank</h2>

    <!-- Hiển thị thông báo lỗi nếu có -->
    <div th:if="${param.error}" style="margin-bottom: 20px; padding: 10px; background-color: #fee2e2; color: #dc2626; border: 1px solid #f87171; border-radius: 8px; font-size: 14px;">
        <span th:text="${session['SPRING_SECURITY_LAST_EXCEPTION'] != null ? 
            (session['SPRING_SECURITY_LAST_EXCEPTION'].message.contains('Maximum sessions') ? 
                'Tài khoản này đang được đăng nhập ở thiết bị khác!' : 
                'Tài khoản hoặc mật khẩu không chính xác!') 
            : 'Đăng nhập thất bại, vui lòng thử lại!'}">
        </span>
    </div>

    <!-- Hiển thị thông báo đăng xuất -->
    <div th:if="${param.logout}" style="margin-bottom: 20px; padding: 10px; background-color: #dcfce7; color: #16a34a; border: 1px solid #4ade80; border-radius: 8px; font-size: 14px;">
        Đã đăng xuất thành công.
    </div>

    <form th:action="@{/login}" method="post">

        <div class="input-group">
            <input type="text" name="username" placeholder="Username" required>
        </div>

        <div class="input-group">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>

    </form>

    <div class="footer">
        Forgot password? <a th:href="@{/forgot}">Click here</a>
    </div>
    <div class="footer">
        Đăng Kí? <a th:href="@{/create}">Click here</a>
    </div>
</div>

<script src="/js/toast.js"></script>
</body>
</html>
