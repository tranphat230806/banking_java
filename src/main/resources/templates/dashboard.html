<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            min-height: 100vh;
            color: white;
        }

        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            height: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            padding: 30px 20px;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 40px;
            color: #38bdf8;
        }

        .menu a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 14px 18px;
            margin-bottom: 12px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .menu a:hover {
            background: #38bdf8;
        }

        .main {
            margin-left: 250px;
            padding: 30px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .welcome h2 {
            font-size: 28px;
        }

        .welcome p {
            color: #cbd5e1;
        }

        .user-box {
            background: rgba(255, 255, 255, 0.08);
            padding: 12px 18px;
            border-radius: 15px;
        }

        .cards {
            display: grid;
            grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.08);
            padding: 25px;
            border-radius: 20px;
        }

        .card h3 {
            color: #cbd5e1;
            margin-bottom: 12px;
        }

        .value {
            font-size: 30px;
            font-weight: bold;
        }

        .actions {
            display: grid;
            grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .action-btn {
            padding: 18px;
            border: none;
            border-radius: 18px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }

        .transfer {
            background: #22c55e;
        }

        .deposit {
            background: #3b82f6;
        }

        .withdraw {
            background: #ef4444;
        }

        .qr {
            background: #a855f7;
        }

        .table-box {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 25px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 14px;
            text-align: left;
        }

        tr {
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .success {
            color: #22c55e;
        }

        .pending {
            color: #facc15;
        }

        .failed {
            color: #ef4444;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <div class="logo">💳 Evo Bank</div>

    <div class="menu">
        <a th:href="@{/home}">🏠 Dashboard</a>
        <a th:href="@{/banking}">💸 Chuyển khoản</a>
        <a th:href="@{/history}">📜 Lịch sử GD</a>
        <a th:href="@{/qr}">📱 QR Payment</a>
        <a th:href="@{/profile}">👤 Hồ sơ</a>
        <a href="#" onclick="document.getElementById('logoutForm').submit(); return false;">
            🚪 Logout
        </a>

        <form id="logoutForm" th:action="@{/logout}" method="post" style="display:none;">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        </form>
    </div>
</div>

<div class="main">

    <div class="topbar">
        <div class="welcome">
            <h2>
                Xin chào,
                <span th:text="${user.name}">User</span>
            </h2>
            <p>Chúc bạn một ngày giao dịch thuận lợi</p>
        </div>

        <div class="user-box">
            ID: <span th:text="${user.id}">1</span>
        </div>
    </div>

    <!-- Cards -->
    <div class="cards">

        <div class="card">
            <h3>Số dư hiện tại</h3>
            <div class="value">
                $ <span th:text="${user.balance}">1000</span>
            </div>
        </div>

        <div class="card">
            <h3>Mã tài khoản</h3>
            <div class="value" th:text="${user.code}">ACC001</div>
        </div>

        <div class="card">
            <h3>Loại tiền</h3>
            <div class="value" th:text="${user.currency}">USD</div>
        </div>

    </div>

    <!-- Actions -->
    <div class="actions">
        <button class="action-btn transfer"
                onclick="location.href='/banking'">💸 Chuyển khoản
        </button>

        <button class="action-btn deposit">💰 Nạp tiền</button>

        <button class="action-btn withdraw">🏧 Rút tiền</button>

        <button class="action-btn qr">📱 QR Pay</button>
    </div>

    <!-- History -->
    <div class="table-box">
        <h2>Lịch sử giao dịch gần đây</h2>

        <table>
            <tr>
                <th>Ngày</th>
                <th>Mô tả</th>
                <th>Số tiền</th>
                <th>Trạng thái</th>
            </tr>

            <tr th:each="item : ${list}">
                <td th:text="${item.date}">2026-04-22</td>
                <td th:text="${item.description}">Chuyển khoản</td>
                <td th:text="${item.amount}">500</td>
                <td th:text="${item.status}" class="success">SUCCESS</td>
            </tr>

        </table>
    </div>

</div>

</body>
</html>
