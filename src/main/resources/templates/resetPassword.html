<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            width: 380px;
            padding: 40px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            color: white;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        h2 {
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 25px;
        }

        /* OTP inputs */
        .otp-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .otp-container input {
            width: 45px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            border-radius: 10px;
            border: none;
        }

        .otp-container input:focus {
            outline: none;
            box-shadow: 0 0 0 2px #00f2fe;
        }

        /* password input */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        .toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 13px;
            color: #333;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .error {
            margin-top: 15px;
            color: #ffb3b3;
            font-size: 13px;
        }

        .footer {
            margin-top: 20px;
            font-size: 13px;
        }

        .footer a {
            color: #00f2fe;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Nhập OTP</h2>
    <p class="subtitle">Nhập mã OTP và mật khẩu mới</p>

    <form method="post" action="/reset" onsubmit="combineOtp()">
        <!-- OTP 6 ô -->
        <div class="otp-container">
            <input type="text" maxlength="1" oninput="moveNext(this,0)">
            <input type="text" maxlength="1" oninput="moveNext(this,1)">
            <input type="text" maxlength="1" oninput="moveNext(this,2)">
            <input type="text" maxlength="1" oninput="moveNext(this,3)">
            <input type="text" maxlength="1" oninput="moveNext(this,4)">
            <input type="text" maxlength="1" oninput="moveNext(this,5)">
        </div>

        <!-- hidden input chứa OTP -->
        <input type="hidden" name="otp" id="otp">

        <!-- password -->
        <div class="input-group">
            <input type="password" id="password" name="password" placeholder="Mật khẩu mới" required>
            <span class="toggle" onclick="togglePassword()">👁</span>
        </div>
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}">
        <button id="btn" type="submit" onclick="thong_bao()">Đổi mật khẩu</button>
    </form>

    <p class="error" th:text="${error}"></p>

    <div class="footer">
        <a href="/login">← Quay lại đăng nhập</a>
    </div>
</div>

<script>
    const inputs = document.querySelectorAll(".otp-container input");

    function moveNext(el, index) {
        if (el.value.length === 1 && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
    }

    function thong_bao() {
        alert("đổi mật khẩu thành công!!!");
    }

    function combineOtp() {
        let otp = "";
        inputs.forEach(i => otp += i.value);
        document.getElementById("otp").value = otp;

        const btn = document.getElementById("btn");
        btn.innerText = "Đang xử lý...";
        btn.disabled = true;
    }

    function togglePassword() {
        const pw = document.getElementById("password");
        pw.type = pw.type === "password" ? "text" : "password";
    }

    // paste OTP auto fill
    document.addEventListener("paste", function (e) {
        let data = e.clipboardData.getData("text").trim();
        if (data.length === 6) {
            inputs.forEach((input, i) => {
                input.value = data[i];
            });
        }
    });
</script>

</body>
</html>
