<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản | Banking System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .avatar-preview {
            width: 120px;
            height: 120px;
            border-radius: 9999px;
            object-fit: cover;
            border: 2px solid #38bdf8;
            margin-bottom: 10px;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

<div class="bg-white rounded-xl shadow-lg p-8 w-full max-w-md">
    <h2 class="text-2xl font-bold text-center mb-6 text-slate-800">Đăng ký tài khoản</h2>

    <!-- Hiển thị thông báo -->
    <div th:if="${error}" class="mb-4 p-3 bg-red-100 text-red-700 border border-red-200 rounded-lg text-sm text-center font-medium">
        <span th:text="${error}"></span>
    </div>
    <div th:if="${success}" class="mb-4 p-3 bg-green-100 text-green-700 border border-green-200 rounded-lg text-sm text-center font-medium">
        <span th:text="${success}"></span>
    </div>

    <!-- FORM ĐĂNG KÝ -->
    <form th:action="@{/create}" method="post" enctype="multipart/form-data" class="space-y-4">

        <div class="flex flex-col items-center">
            <img id="previewImg" src="/images/default-avatar.png" alt="Avatar" class="avatar-preview">
            <input type="file" name="avatar" accept="image/*" onchange="preview(event)" class="mt-2">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700">Username</label>
            <input type="text" name="username" placeholder="Nhập mã tài khoản"
                   class="mt-1 w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-400">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700">Password</label>
            <input type="password" name="password" placeholder="Nhập mật khẩu"
                   class="mt-1 w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-400">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700">Tên hiển thị</label>
            <input type="text" name="fullName" placeholder="Tên hiển thị"
                   class="mt-1 w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-400">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700">Email</label>
            <input type="email" name="email" placeholder="abc@gmail.com"
                   class="mt-1 w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-400">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700">Số điện thoại</label>
            <input type="text" name="phone" placeholder="0123456789"
                   class="mt-1 w-full p-2 border rounded-lg focus:ring-2 focus:ring-blue-400">
        </div>

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <button type="submit"
                class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition-colors">
            Tạo tài khoản
        </button>

        <p class="text-center text-sm text-slate-500 mt-2">
            <a href="/login" class="text-blue-500 hover:underline">← Quay lại đăng nhập</a>
        </p>

    </form>
</div>

<script>
    function preview(event) {
        const reader = new FileReader();
        reader.onload = function () {
            document.getElementById('previewImg').src = reader.result;
        };
        reader.readAsDataURL(event.target.files[0]);
    }
</script>

</body>
</html>
