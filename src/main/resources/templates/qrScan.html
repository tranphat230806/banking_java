<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quét QR</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: #fff;
        }

        h1 {
            margin-bottom: 20px;
        }

        #reader {
            width: 300px;
            height: 300px;
            border: 4px solid #fff;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .status {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .btn-retry {
            background: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: #4facfe;
        }

        .btn-retry:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body>
<h1>Quét QR của bạn</h1>
<div id="reader"></div>
<div class="status" id="status">Đang chờ quét QR...</div>
<button class="btn-retry" onclick="restartScanner()">Quét lại</button>
<meta name="_csrf" th:content="${_csrf.token}"/>
<meta name="_csrf_header" th:content="${_csrf.headerName}"/>
<script>
    let html5QrcodeScanner;


    function onScanSuccess(decodedText, decodedResult) {
        document.getElementById('status').innerText = "Đang xử lý QR...";
        const token = document.querySelector('meta[name="_csrf"]').getAttribute('content');
        const header = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

        fetch('/scanQR', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                [header]: token // thêm CSRF header
            },
            body: JSON.stringify({qr: decodedText})
        })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    window.location.href = '/banking?account=' + encodeURIComponent(decodedText);
                } else {
                    document.getElementById('status').innerText = "QR không hợp lệ. Thử lại.";
                    restartScanner();
                }
            })
            .catch(err => {
                console.error(err);
                document.getElementById('status').innerText = "Lỗi server. Thử lại.";
                restartScanner();
            });

        html5QrcodeScanner.stop().catch(err => console.error(err));
    }

    function onScanFailure(error) {
        // console.log(`Scan error: ${error}`);
    }

    function startScanner() {
        html5QrcodeScanner = new Html5Qrcode("reader");
        html5QrcodeScanner.start(
            {facingMode: "user"},
            {fps: 10, qrbox: 250},
            onScanSuccess,
            onScanFailure
        ).catch(err => console.error(err));
    }

    function restartScanner() {
        document.getElementById('status').innerText = "Đang chờ quét QR...";
        html5QrcodeScanner.stop().finally(() => startScanner());
    }

    window.onload = startScanner;
</script>
</body>
</html>
