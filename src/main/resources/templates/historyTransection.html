<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lịch Sử Giao Dịch | Banking</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: radial-gradient(circle at top left, #1e3a8a 0%, transparent 30%),
            radial-gradient(circle at bottom right, #0ea5e9 0%, transparent 25%),
            #0f172a;
            color: white;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .title {
            font-size: 32px;
            font-weight: 700;
        }

        .title span {
            color: #38bdf8;
        }

        .account-box {
            background: #1e293b;
            padding: 12px 18px;
            border-radius: 14px;
            font-size: 14px;
            color: #cbd5e1;
        }

        .table-card {
            background: rgba(30, 41, 59, 0.95);
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #0f172a;
        }

        th {
            padding: 18px;
            text-align: left;
            font-size: 14px;
            color: #94a3b8;
        }

        td {
            padding: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 15px;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .money-out {
            color: #ef4444;
            font-weight: 700;
        }

        .money-in {
            color: #22c55e;
            font-weight: 700;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            display: inline-block;
        }

        .success {
            background: #16a34a22;
            color: #22c55e;
        }

        .pending {
            background: #eab30822;
            color: #facc15;
        }

        .failed {
            background: #dc262622;
            color: #ef4444;
        }

        .empty {
            text-align: center;
            padding: 50px;
            color: #94a3b8;
        }

        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 18px;
            background: #38bdf8;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
        }

        .back-btn:hover {
            background: #0ea5e9;
        }

        @media (max-width: 900px) {
            .table-card {
                overflow-x: auto;
            }

            table {
                min-width: 900px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <div class="title">
            Transaction <span>History</span>
        </div>

        <div class="account-box">
            Account:
            <b th:text="${account.code}">ACC001</b>
        </div>
    </div>

    <div class="table-card">

        <table>

            <thead>
            <tr>
                <th>ID</th>
                <th>From</th>
                <th>To</th>
                <th>Amount</th>
                <th>Description</th>
                <th>Status</th>
                <th>Created</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="item : ${list}">

                <td th:text="${item.id}">1</td>

                <td th:text="${item.fromAccount.code}">ACC001</td>

                <td th:text="${item.toAccount.code}">ACC002</td>

                <td th:if="${item.fromAccount.id == account.id}"
                    class="money-out"
                    th:text="'- ' + ${#numbers.formatDecimal(item.amount,0,'COMMA',0,'POINT')} + ' VND'">
                </td>

                <td th:if="${item.toAccount.id == account.id}"
                    class="money-in"
                    th:text="'+ ' + ${#numbers.formatDecimal(item.amount,0,'COMMA',0,'POINT')} + ' VND'">
                </td>

                <td th:text="${item.description}">Transfer</td>

                <td>
                    <span class="badge success"
                          th:if="${item.status == 'SUCCESS'}"
                          th:text="${item.status}">
                    </span>

                    <span class="badge pending"
                          th:if="${item.status == 'PENDING'}"
                          th:text="${item.status}">
                    </span>

                    <span class="badge failed"
                          th:if="${item.status == 'FAILED'}"
                          th:text="${item.status}">
                    </span>
                </td>

                <td th:text="${#temporals.format(item.created,'dd/MM/yyyy HH:mm')}">
                    29/04/2026
                </td>

            </tr>

            <tr th:if="${#lists.isEmpty(list)}">
                <td colspan="7" class="empty">
                    No transaction history found.
                </td>
            </tr>

            </tbody>

        </table>

    </div>

    <div>
        <a href="/dashboard" class="back-btn">Về trang chủ</a>
    </div>

</div>

</body>
</html>
